<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub — Панель администратора</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fs-3" href="index.html">ADMIN PANEL</a>
            <div class="ms-auto d-flex align-items-center">
                <span class="badge border border-danger text-danger me-3 px-3 py-2">
                    <i class="bi bi-shield-lock"></i> СИСТЕМНЫЙ РЕЖИМ
                </span>
                <a href="index.html" class="btn btn-outline-warning btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Выйти в каталог
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <small class="small fw-bold opacity-50 uppercase">Всего фильмов</small>
                    <h3 class="fw-bold mb-0">0</h3> </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <small class="small fw-bold opacity-50 uppercase">Новых отзывов (24ч)</small>
                    <h3 class="fw-bold mb-0">+0</h3> </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 shadow-sm">
                    <small class="small fw-bold opacity-50 uppercase">Пользователей</small>
                    <h3 class="fw-bold mb-0">0</h3> </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-transparent py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">Управление коллекцией Movies</h5>
                        <div class="btn-group gap-2">
                            <button class="btn btn-warning btn-sm fw-bold">
                                <i class="bi bi-plus-lg"></i> ДОБАВИТЬ ФИЛЬМ
                            </button>
                            <button class="btn btn-outline-warning btn-sm fw-bold" onclick="location.reload()">
                                <i class="bi bi-arrow-repeat"></i> ОБНОВИТЬ ДАННЫЕ
                            </button>
                        </div>
                    </div>
                    
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead>
                                    <tr class="small fw-bold uppercase">
                                        <th class="ps-4">ID</th>
                                        <th>Название</th>
                                        <th>Год</th>
                                        <th>Рейтинг</th>
                                        <th class="text-end pe-4">Действия</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td colspan="5" class="text-center py-4 opacity-50">
                                            Загрузка данных из MongoDB...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div class="card-footer bg-transparent py-3 opacity-50 text-end">
                        <span class="small">Показано 0 записей</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/admin.js"></script>
</body>
</html>
