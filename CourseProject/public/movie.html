<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub — Информация о фильме</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fs-3" href="index.html">MOVIEHUB</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="index.html" class="btn btn-outline-warning btn-sm me-3">
                    <i class="bi bi-arrow-left"></i> Назад
                </a>
                <a href="profile.html" class="d-flex align-items-center text-decoration-none">
                    <div id="nav-avatar" class="rounded-circle d-flex align-items-center justify-content-center fw-bold avatar-circle" style="width: 40px; height: 40px;">
                        ?
                    </div>
                </a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-5">
            
            <div class="col-lg-4">
                <div class="card shadow-lg overflow-hidden">
                    <img id="movie-poster" src="https://via.placeholder.com/400x600?text=Загрузка..." class="card-img-top" alt="Постер">
                    
                    <div class="card-body text-center p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="text-start">
                                <span class="small d-block fw-bold opacity-75 uppercase">Рейтинг MovieHub</span>
                                <span class="h2 fw-bold mb-0" id="movie-rating">0.0</span>
                            </div>
                            <div class="text-end">
                                <i class="bi bi-star-fill fs-3 text-warning"></i>
                            </div>
                        </div>
                        
                        <button class="btn btn-warning w-100 fw-bold py-3 shadow">
                            <i class="bi bi-heart-fill"></i> В ИЗБРАННОЕ
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <h1 id="movie-title" class="display-3 fw-bold mb-1">Загрузка...</h1>
                <p id="movie-meta" class="fs-4 mb-4 opacity-75">Год • Режиссер • 0 мин.</p>
                
                <div id="genre-container" class="mb-4">
                    <span class="badge rounded-pill bg-warning px-3 py-2 me-2 shadow-sm">Жанр</span>
                </div>

                <div class="p-4 rounded border-start border-4 border-warning shadow-sm mb-5">
                    <p id="movie-description" class="lead mb-0" style="font-style: italic;">
                        Описание фильма загружается из базы данных...
                    </p>
                </div>

                <h4 class="mb-4"><i class="bi bi-play-btn-fill text-warning"></i> Официальный трейлер</h4>
                <div class="ratio ratio-16x9 rounded shadow-lg overflow-hidden border border-secondary">
                    <iframe src="" title="YouTube video player" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div class="row mt-5 pt-5 border-top border-secondary border-opacity-25">
            <div class="col-lg-8 offset-lg-4">
                <h3 class="mb-4">Обсуждение <span class="text-warning">Live</span></h3>
                
                <div id="review-list" class="mb-4">
                    </div>

                <div class="card p-4 shadow">
                    <label class="form-label small fw-bold uppercase mb-2">Оставить отзыв</label>
                    <textarea class="form-control mb-3" id="review-text" placeholder="Ваше мнение о фильме..." rows="3"></textarea>
                    <div class="d-flex justify-content-end">
                        <button id="send-review" class="btn btn-warning fw-bold px-5 py-2">ОТПРАВИТЬ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="/socket.io/socket.io.js"></script>
    
    <script src="js/movie.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const login = localStorage.getItem('userLogin');
            if (login) {
                const avatar = document.getElementById('nav-avatar');
                if (avatar) avatar.textContent = login.charAt(0).toUpperCase();
            }
        });
    </script>
</body>
</html>
